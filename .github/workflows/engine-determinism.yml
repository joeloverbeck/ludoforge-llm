name: Engine Determinism Parity

on:
  push:
    branches: [main]
    paths:
      - 'packages/engine/src/kernel/**'
      - 'packages/engine/src/sim/**'
      - 'packages/engine/src/agents/**'
      - 'packages/engine/test/determinism/**'
      - 'data/games/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/engine/src/kernel/**'
      - 'packages/engine/src/sim/**'
      - 'packages/engine/src/agents/**'
      - 'packages/engine/test/determinism/**'
      - 'data/games/**'

jobs:
  determinism:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @ludoforge/engine build
      - run: pnpm -F @ludoforge/engine test:determinism
