name: Engine Game Packages
on:
  push:
    branches: [main]
    paths:
      - 'packages/engine/**'
      - 'data/games/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - 'eslint.config.js'
      - '.github/workflows/engine-game-packages.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/engine/**'
      - 'data/games/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - 'eslint.config.js'
      - '.github/workflows/engine-game-packages.yml'
  workflow_dispatch:
concurrency:
  group: engine-game-packages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  engine-game-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm guard:worktree-pointers
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @ludoforge/engine build
      - run: pnpm -F @ludoforge/engine test:integration:game-packages
