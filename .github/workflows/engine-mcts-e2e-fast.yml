name: Engine MCTS E2E (fast)
on:
  push:
    branches: [main]
    paths:
      - 'packages/engine/src/agents/**'
      - 'packages/engine/test/e2e/mcts/**'
      - 'data/games/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/engine-mcts-e2e-fast.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/engine/src/agents/**'
      - 'packages/engine/test/e2e/mcts/**'
      - 'data/games/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/engine-mcts-e2e-fast.yml'
  workflow_dispatch:
concurrency:
  group: engine-mcts-e2e-fast-${{ github.ref }}
  cancel-in-progress: true
jobs:
  engine-mcts-e2e-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm guard:worktree-pointers
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @ludoforge/engine build
      - run: pnpm -F @ludoforge/engine test:e2e:mcts:fast
