name: Engine Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/engine/**'
      - 'data/games/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - 'eslint.config.js'
      - '.github/workflows/engine-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/engine/**'
      - 'data/games/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - 'eslint.config.js'
      - '.github/workflows/engine-tests.yml'
  workflow_dispatch:

concurrency:
  group: engine-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm guard:worktree-pointers
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @ludoforge/engine build
      - name: Upload engine dist
        uses: actions/upload-artifact@v7
        with:
          name: engine-dist
          path: packages/engine/dist
          retention-days: 1
          if-no-files-found: error

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.lane.timeout }}
    strategy:
      fail-fast: false
      matrix:
        lane:
          - { id: fitl-events-shard-a, script: 'test:integration:fitl-events:shard-a', timeout: 30 }
          - { id: fitl-events-shard-b, script: 'test:integration:fitl-events:shard-b', timeout: 30 }
          - { id: fitl-events-shard-c, script: 'test:integration:fitl-events:shard-c', timeout: 30, continue_on_error: true }
          - { id: fitl-rules,          script: 'test:integration:fitl-rules',          timeout: 30, continue_on_error: true }
          - { id: texas-cross-game,    script: 'test:integration:texas-cross-game',    timeout: 30 }
          - { id: slow-parity-shard-a, script: 'test:integration:slow-parity:shard-a', timeout: 30 }
          - { id: slow-parity-shard-b, script: 'test:integration:slow-parity:shard-b', timeout: 30 }
          - { id: slow-parity-shard-c, script: 'test:integration:slow-parity:shard-c', timeout: 30 }
          - { id: e2e-all,             script: 'test:e2e:all',                         timeout: 30 }
          - { id: memory,              script: 'test:memory',                          timeout: 10 }
          - { id: performance,         script: 'test:performance',                     timeout: 30 }
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download engine dist
        uses: actions/download-artifact@v8
        with:
          name: engine-dist
          path: packages/engine/dist
      - name: Run engine ${{ matrix.lane.id }}
        continue-on-error: ${{ matrix.lane.continue_on_error == true }}
        run: pnpm -F @ludoforge/engine ${{ matrix.lane.script }}
      - name: Record non-blocking lane
        if: ${{ matrix.lane.continue_on_error == true }}
        run: |
          {
            echo "### Non-blocking engine lane"
            echo ""
            echo "\`${{ matrix.lane.id }}\` is temporarily non-blocking for Spec 149 Phase 0."
            echo "Ticket 149FITLEVNUMVM-003 owns restoring blocking semantics after Phase 4."
          } >> "$GITHUB_STEP_SUMMARY"
