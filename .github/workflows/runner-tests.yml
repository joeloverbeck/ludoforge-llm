name: Runner Tests
on:
  push:
    branches: [main]
    paths:
      - 'packages/runner/**'
      - 'packages/engine/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/runner-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/runner/**'
      - 'packages/engine/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/runner-tests.yml'
  workflow_dispatch:
concurrency:
  group: runner-tests-${{ github.ref }}
  cancel-in-progress: true
jobs:
  runner-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm guard:worktree-pointers
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @ludoforge/engine build
      - run: pnpm -F @ludoforge/runner test
