      fitl-map-space:
        mode: lanes
        laneGap: 30
        laneOrder:
          - regular
          - base
        lanes:
          regular:
            anchor: center
            pack: centeredRow
            spacingX: 42
          base:
            anchor: belowPreviousLane
            pack: centeredRow
            spacingX: 54
    assignments:
      byCategory:
        city: fitl-map-space
        province: fitl-map-space
  hiddenZones:
    - deck:none
    - lookahead:none
    - played:none
  markerBadge:
    markerId: support
    colorMap:
      activeOpposition:
        color: "#dc2626"
        abbreviation: AO
      passiveOpposition:
        color: "#f97316"
        abbreviation: PO
      neutral:
        color: "#6b7280"
        abbreviation: N
      passiveSupport:
        color: "#93c5fd"
        abbreviation: PS
      activeSupport:
        color: "#3b82f6"
        abbreviation: AS
