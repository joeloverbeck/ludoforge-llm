version: 1

layout:
  mode: graph
  hints:
    regions:
      - name: North Vietnam
        position: n
        zones:
          - "north-vietnam:none"
      - name: Laos
        position: nw
        zones:
          - "central-laos:none"
          - "southern-laos:none"
      - name: Cambodia
        position: sw
        zones:
          - "northeast-cambodia:none"
          - "the-fishhook:none"
          - "the-parrots-beak:none"
          - "sihanoukville:none"
      - name: South Vietnam
        position: e
        zones:
          - "saigon:none"
          - "hue:none"
          - "da-nang:none"
          - "kontum:none"
          - "qui-nhon:none"
          - "cam-ranh:none"
          - "an-loc:none"
          - "can-tho:none"
          - "quang-tri-thua-thien:none"
          - "quang-nam:none"
          - "quang-tin-quang-ngai:none"
          - "binh-dinh:none"
          - "pleiku-darlac:none"
          - "phu-bon-phu-yen:none"
          - "khanh-hoa:none"
          - "phuoc-long:none"
          - "quang-duc-long-khanh:none"
          - "binh-tuy-binh-thuan:none"
          - "tay-ninh:none"
          - "kien-phong:none"
          - "kien-hoa-vinh-binh:none"
          - "ba-xuyen:none"
          - "kien-giang-an-xuyen:none"

factions:
  us:
    color: "#808000"
    displayName: United States
  arvn:
    color: "#ffff00"
    displayName: ARVN
  nva:
    color: "#ff0000"
    displayName: NVA
  vc:
    color: "#00bfff"
    displayName: Viet Cong

zones:
  categoryStyles:
    city:
      shape: circle
      width: 160
      height: 160
      color: "#5b7fa5"
    province:
      shape: rectangle
      width: 360
      height: 220
    loc:
      shape: connection

  connectionStyles:
    highway:
      strokeWidth: 8
      strokeColor: "#8b7355"
      strokeAlpha: 0.8
    mekong:
      strokeWidth: 12
      strokeColor: "#4a7a8c"
      strokeAlpha: 0.9
      wavy: true
      waveAmplitude: 4
      waveFrequency: 0.08

  connectionAnchors:
    an-loc:
      x: 420
      y: 250
    ban-me-thuot:
      x: 560
      y: 220
    bac-lieu:
      x: 360
      y: 520
    chau-doc:
      x: 200
      y: 420
    da-lat:
      x: 640
      y: 360
    dak-to:
      x: 520
      y: 60
    khe-sanh:
      x: 360
      y: 20
    long-phu:
      x: 420
      y: 460

  connectionRoutes:
    "loc-ban-me-thuot-da-lat:none":
      points:
        - { kind: anchor, anchorId: "ban-me-thuot" }
        - { kind: anchor, anchorId: "da-lat" }
      segments:
        - { kind: straight }
    "loc-cam-ranh-da-lat:none":
      points:
        - { kind: zone, zoneId: "cam-ranh:none" }
        - { kind: anchor, anchorId: "da-lat" }
      segments:
        - { kind: straight }
    "loc-can-tho-bac-lieu:none":
      points:
        - { kind: zone, zoneId: "can-tho:none" }
        - { kind: anchor, anchorId: "bac-lieu" }
      segments:
        - { kind: straight }
    "loc-can-tho-chau-doc:none":
      points:
        - { kind: zone, zoneId: "can-tho:none" }
        - { kind: anchor, anchorId: "chau-doc" }
      segments:
        - { kind: straight }
    "loc-can-tho-long-phu:none":
      points:
        - { kind: zone, zoneId: "can-tho:none" }
        - { kind: anchor, anchorId: "long-phu" }
      segments:
        - { kind: straight }
    "loc-da-nang-dak-to:none":
      points:
        - { kind: zone, zoneId: "da-nang:none" }
        - { kind: anchor, anchorId: "dak-to" }
      segments:
        - { kind: straight }
    "loc-da-nang-qui-nhon:none":
      points:
        - { kind: zone, zoneId: "da-nang:none" }
        - { kind: zone, zoneId: "qui-nhon:none" }
      segments:
        - { kind: straight }
    "loc-hue-da-nang:none":
      points:
        - { kind: zone, zoneId: "da-nang:none", anchor: 90 }
        - { kind: zone, zoneId: "hue:none", anchor: 270 }
      segments:
        - kind: quadratic
          control: { kind: curvature, offset: 0.3 }
    "loc-hue-khe-sanh:none":
      points:
        - { kind: zone, zoneId: "hue:none" }
        - { kind: anchor, anchorId: "khe-sanh" }
      segments:
        - { kind: straight }
    "loc-kontum-ban-me-thuot:none":
      points:
        - { kind: zone, zoneId: "kontum:none" }
        - { kind: anchor, anchorId: "ban-me-thuot" }
      segments:
        - { kind: straight }
    "loc-kontum-dak-to:none":
      points:
        - { kind: zone, zoneId: "kontum:none" }
        - { kind: anchor, anchorId: "dak-to" }
      segments:
        - { kind: straight }
    "loc-kontum-qui-nhon:none":
      points:
        - { kind: zone, zoneId: "kontum:none" }
        - { kind: zone, zoneId: "qui-nhon:none" }
      segments:
        - { kind: straight }
    "loc-qui-nhon-cam-ranh:none":
      points:
        - { kind: zone, zoneId: "cam-ranh:none" }
        - { kind: zone, zoneId: "qui-nhon:none" }
      segments:
        - { kind: straight }
    "loc-saigon-an-loc-ban-me-thuot:none":
      points:
        - { kind: zone, zoneId: "saigon:none" }
        - { kind: anchor, anchorId: "an-loc" }
        - { kind: anchor, anchorId: "ban-me-thuot" }
      segments:
        - { kind: straight }
        - kind: quadratic
          control: { kind: curvature, offset: 0.3 }
    "loc-saigon-cam-ranh:none":
      points:
        - { kind: zone, zoneId: "cam-ranh:none" }
        - { kind: zone, zoneId: "saigon:none" }
      segments:
        - { kind: straight }
    "loc-saigon-can-tho:none":
      points:
        - { kind: zone, zoneId: "can-tho:none" }
        - { kind: zone, zoneId: "saigon:none" }
      segments:
        - { kind: straight }
    "loc-saigon-da-lat:none":
      points:
        - { kind: zone, zoneId: "saigon:none" }
        - { kind: anchor, anchorId: "da-lat" }
      segments:
        - { kind: straight }

  markerBadge:
    markerId: support
    colorMap:
      activeOpposition:
        color: "#dc2626"
        abbreviation: AO
      passiveOpposition:
        color: "#f97316"
        abbreviation: PO
      neutral:
        color: "#6b7280"
        abbreviation: "N"
      passiveSupport:
        color: "#93c5fd"
        abbreviation: PS
      activeSupport:
        color: "#3b82f6"
        abbreviation: AS

  attributeRules:
    - match:
        category: [province]
        attributeContains:
          terrainTags: highland
      style:
        color: "#6b5b3e"
    - match:
        category: [province]
        attributeContains:
          terrainTags: jungle
      style:
        color: "#3d5c3a"
    - match:
        category: [province]
        attributeContains:
          terrainTags: lowland
      style:
        color: "#5a7a52"
    - match:
        category: [loc]
        attributeContains:
          terrainTags: highway
      style:
        connectionStyleKey: highway
    - match:
        category: [loc]
        attributeContains:
          terrainTags: mekong
      style:
        connectionStyleKey: mekong

  overrides:
    "an-loc:none":
      label: "An Loc"
    "ba-xuyen:none":
      label: "Ba Xuyen"
    "binh-dinh:none":
      label: "Binh Dinh"
    "binh-tuy-binh-thuan:none":
      label: "Binh Tuy Binh Thuan"
    "cam-ranh:none":
      label: "Cam Ranh"
    "can-tho:none":
      label: "Can Tho"
    "central-laos:none":
      label: "Central Laos"
    "da-nang:none":
      label: "Da Nang"
    "hue:none":
      label: "Hue"
    "khanh-hoa:none":
      label: "Khanh Hoa"
    "kien-giang-an-xuyen:none":
      label: "Kien Giang An Xuyen"
    "kien-hoa-vinh-binh:none":
      label: "Kien Hoa Vinh Binh"
    "kien-phong:none":
      label: "Kien Phong"
    "kontum:none":
      label: "Kontum"
    "loc-ban-me-thuot-da-lat:none":
      label: "Ban Me Thuot-Da Lat"
    "loc-cam-ranh-da-lat:none":
      label: "Cam Ranh-Da Lat"
    "loc-can-tho-bac-lieu:none":
      label: "Can Tho-Bac Lieu"
    "loc-can-tho-chau-doc:none":
      label: "Can Tho-Chau Doc"
    "loc-can-tho-long-phu:none":
      label: "Can Tho-Long Phu"
    "loc-da-nang-dak-to:none":
      label: "Da Nang-Dak To"
    "loc-da-nang-qui-nhon:none":
      label: "Da Nang-Qui Nhon"
    "loc-hue-da-nang:none":
      label: "Hue-Da Nang"
    "loc-hue-khe-sanh:none":
      label: "Hue-Khe Sanh"
    "loc-kontum-ban-me-thuot:none":
      label: "Kontum-Ban Me Thuot"
    "loc-kontum-dak-to:none":
      label: "Kontum-Dak To"
    "loc-kontum-qui-nhon:none":
      label: "Kontum-Qui Nhon"
    "loc-qui-nhon-cam-ranh:none":
      label: "Qui Nhon-Cam Ranh"
    "loc-saigon-an-loc-ban-me-thuot:none":
      label: "Saigon-An Loc-Ban Me Thuot"
    "loc-saigon-cam-ranh:none":
      label: "Saigon-Cam Ranh"
    "loc-saigon-can-tho:none":
      label: "Saigon-Can Tho"
    "loc-saigon-da-lat:none":
      label: "Saigon-Da Lat"
    "north-vietnam:none":
      label: "North Vietnam"
    "northeast-cambodia:none":
      label: "Northeast Cambodia"
    "phu-bon-phu-yen:none":
      label: "Phu Bon Phu Yen"
    "phuoc-long:none":
      label: "Phuoc Long"
    "pleiku-darlac:none":
      label: "Pleiku Darlac"
    "quang-duc-long-khanh:none":
      label: "Quang Duc Long Khanh"
    "quang-nam:none":
      label: "Quang Nam"
    "quang-tin-quang-ngai:none":
      label: "Quang Tin Quang Ngai"
    "quang-tri-thua-thien:none":
      label: "Quang Tri"
    "qui-nhon:none":
      label: "Qui Nhon"
    "saigon:none":
      label: "Saigon"
    "sihanoukville:none":
      label: "Sihanoukville"
    "southern-laos:none":
      label: "Southern Laos"
    "tay-ninh:none":
      label: "Tay Ninh"
    "the-fishhook:none":
      label: "The Fishhook"
    "the-parrots-beak:none":
      label: "The Parrots Beak"

  hiddenZones:
    - "deck:none"
    - "lookahead:none"
    - "played:none"

  layoutRoles:
    "available-ARVN:none": forcePool
    "available-NVA:none": forcePool
    "available-US:none": forcePool
    "available-VC:none": forcePool
    "casualties-US:none": forcePool
    "leader:none": card
    "out-of-play-ARVN:none": forcePool
    "out-of-play-US:none": forcePool
    "out-of-play-NVA:none": forcePool
    "out-of-play-VC:none": forcePool

  tokenLayouts:
    presets:
      fitl-map-space:
        mode: lanes
        laneGap: 24
        laneOrder: [regular, base]
        lanes:
          regular:
            anchor: center
            pack: centeredRow
            spacingX: 32
          base:
            anchor: belowPreviousLane
            pack: centeredRow
            spacingX: 42
    assignments:
      byCategory:
        city: fitl-map-space
        province: fitl-map-space

edges:
  default:
    color: "#ffffff"
    width: 3.5
    alpha: 0.85

tokens:
  stackBadge:
    fontSize: 13
    fill: "#f8fafc"
    stroke: "#000000"
    strokeWidth: 3
    anchorX: 1
    anchorY: 0
    offsetX: 4
    offsetY: -4

tokenTypes:
  us-troops:
    shape: square
    color: olive
    presentation:
      lane: regular
      scale: 1
  us-bases:
    shape: round-disk
    color: olive
    presentation:
      lane: base
      scale: 1.5
  us-irregulars:
    shape: beveled-cylinder
    color: olive
    presentation:
      lane: regular
      scale: 1
    symbolRules:
      - when:
          - prop: activity
            equals: active
        symbol: star
  arvn-troops:
    shape: square
    color: yellow
    presentation:
      lane: regular
      scale: 1
  arvn-police:
    shape: square
    color: orange
    presentation:
      lane: regular
      scale: 1
  arvn-rangers:
    shape: beveled-cylinder
    color: yellow
    presentation:
      lane: regular
      scale: 1
    symbolRules:
      - when:
          - prop: activity
            equals: active
        symbol: star
  arvn-bases:
    shape: round-disk
    color: yellow
    presentation:
      lane: base
      scale: 1.5
  nva-troops:
    shape: square
    color: red
    presentation:
      lane: regular
      scale: 1
  nva-guerrillas:
    shape: beveled-cylinder
    color: red
    presentation:
      lane: regular
      scale: 1
    symbolRules:
      - when:
          - prop: activity
            equals: active
        symbol: star
  nva-bases:
    shape: round-disk
    color: red
    presentation:
      lane: base
      scale: 1.5
  vc-guerrillas:
    shape: beveled-cylinder
    color: bright-blue
    presentation:
      lane: regular
      scale: 1
    symbolRules:
      - when:
          - prop: activity
            equals: active
        symbol: star
  vc-bases:
    shape: round-disk
    color: bright-blue
    presentation:
      lane: base
      scale: 1.5

actions:
  # Core operations -- single-word IDs auto-format fine, but choice prompts add value
  train:
    choices:
      targetSpaces:
        prompt: "Select spaces to train in"
  patrol:
    choices:
      targetSpaces:
        prompt: "Select LoCs to patrol"
  sweep:
    choices:
      targetSpaces:
        prompt: "Select spaces to sweep"
  assault:
    choices:
      targetSpaces:
        prompt: "Select spaces to assault"
  rally:
    choices:
      targetSpaces:
        prompt: "Select spaces to rally in"
  march:
    choices:
      targetSpaces:
        prompt: "Select destination spaces"
  attack:
    choices:
      targetSpaces:
        prompt: "Select spaces to attack"
  terror:
    choices:
      targetSpaces:
        prompt: "Select spaces for terror"
  # Special activities -- some need display name fixes, all benefit from choice prompts
  advise:
    choices:
      targetSpaces:
        prompt: "Select spaces to advise in"
  airLift:
    displayName: "Airlift"
    choices:
      spaces:
        prompt: "Select spaces for airlift"
  airStrike:
    displayName: "Air Strike"
    choices:
      spaces:
        prompt: "Select spaces for air strike"
  govern:
    choices:
      targetSpaces:
        prompt: "Select spaces to govern"
  transport:
    choices:
      transportOrigin:
        prompt: "Select origin space for transport"
  raid:
    choices:
      targetSpaces:
        prompt: "Select spaces to raid"
  infiltrate:
    choices:
      targetSpaces:
        prompt: "Select spaces to infiltrate"
  bombard:
    choices:
      targetSpaces:
        prompt: "Select spaces to bombard"
  ambushNva:
    displayName: "NVA Ambush"
    choices:
      targetSpaces:
        prompt: "Select spaces for ambush"
  tax:
    choices:
      targetSpaces:
        prompt: "Select spaces to tax"
  subvert:
    choices:
      targetSpaces:
        prompt: "Select spaces to subvert"
  ambushVc:
    displayName: "VC Ambush"
    choices:
      targetSpaces:
        prompt: "Select spaces for ambush"
  # Coup-phase actions with bad auto-formatting
  coupArvnRedeployMandatory:
    displayName: "Coup: ARVN Mandatory Redeploy"
  coupArvnRedeployOptionalTroops:
    displayName: "Coup: ARVN Troop Redeploy"
  coupArvnRedeployPolice:
    displayName: "Coup: ARVN Police Redeploy"
  coupNvaRedeployTroops:
    displayName: "Coup: NVA Troop Redeploy"

actionGroupPolicy:
  synthesize:
    - fromClass: operation
      intoGroup: operationPlusSpecialActivity
      appendTooltipFrom:
        - specialActivity
  hide:
    - specialActivity

victoryStandings:
  tooltipBreakdowns:
    - seat: us
      components:
        - label: "Total Support"
          description: "Population-weighted support (active x2, passive x1)"
        - label: "Available US Pieces"
          description: "Troops and bases in Available space"
    - seat: arvn
      components:
        - label: "COIN-Controlled Population"
          description: "Population where US+ARVN pieces > NVA+VC pieces"
        - label: "Patronage"
          description: "ARVN political support (global variable)"
    - seat: nva
      components:
        - label: "NVA-Controlled Population"
          description: "Population where NVA pieces > all others combined"
        - label: "NVA Bases on Map"
          description: "NVA bases across all map spaces"
    - seat: vc
      components:
        - label: "Total Opposition"
          description: "Population-weighted opposition (active x2, passive x1)"
        - label: "VC Bases on Map"
          description: "VC bases across all map spaces"

regions:
  groupByAttribute: country
  padding: 40
  cornerRadius: 30
  styles:
    southVietnam:
      fillColor: "#2a6e3f"
      fillAlpha: 0.15
      borderColor: "#4a9e6f"
      borderStyle: dashed
      borderWidth: 6
      label: South Vietnam
    northVietnam:
      fillColor: "#8b2020"
      fillAlpha: 0.12
      borderColor: "#c04040"
      borderStyle: dashed
      borderWidth: 6
      label: North Vietnam
    laos:
      fillColor: "#6b5b3e"
      fillAlpha: 0.12
      borderColor: "#9e8b5e"
      borderStyle: dashed
      borderWidth: 6
      label: Laos
    cambodia:
      fillColor: "#3b4f8a"
      fillAlpha: 0.12
      borderColor: "#6b7fba"
      borderStyle: dashed
      borderWidth: 6
      label: Cambodia
